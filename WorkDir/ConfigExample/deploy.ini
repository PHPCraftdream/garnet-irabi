; Deployment-layout parameters used by `php garnet bundle` and
; `php garnet deploy:diff`. Folder names produced side-by-side under
; the host's `remote_path` (configured in ssh.ini).
;
; Leave empty to use built-in defaults (see `php garnet bundle --help`).
; CLI flags --public-dir / --framework-dir / --app-dir / --runtime-dir /
; --public-name override these per invocation.

remote_path   = ""   ; e.g. "/var/www/<hosting-account>/data/www" — base dir on host where public/framework/app/runtime live

public_dir    = ""   ; e.g. "example.com"
framework_dir = ""   ; e.g. "garnet-framework-2026-05-21"
app_dir       = ""   ; e.g. "garnet-app-example"
runtime_dir   = ""   ; e.g. "garnet-runtime-example"
public_name   = ""   ; e.g. "example" (used for asset URL rebranding)
