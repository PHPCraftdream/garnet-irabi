; SSH connection parameters for `php garnet` deploy/admin commands.
; Loaded lazily — only when CLI tooling touches `IniConfig::ssh()`.
; Web requests never read this file.

host                     = ""
port                     = 22
user                     = ""

; --- Identity: choose ONE of the two variants below ---

; Variant 1: path to a private key on disk.
; Relative paths are resolved from the directory of this ssh.ini.
; Typical: drop the key file as `ssh_key` next to this file
; (the parent ConfigDev/ is gitignored so it is safe there).
; Example: identity_file = "ssh_key"
identity_file            = ""

; Variant 2: paste the key contents inline.
; PHP parse_ini_file() preserves newlines inside double-quoted strings.
; ConfigDev/ is gitignored, so inline keys are safe here.
; Leave identity_key empty (or absent) to use identity_file instead.
; If BOTH are set, identity_key takes precedence (a warning is emitted).
identity_key             = ""

strict_host_key_checking = "accept-new"   ; yes | no | accept-new

; Deployment-layout parameters (remote_path / public_dir / framework_dir /
; app_dir / runtime_dir / public_name) live in deploy.ini, not here.
