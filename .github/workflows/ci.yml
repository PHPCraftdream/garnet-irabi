name: CI

# IRabi installs phpcraftdream/garnet-framework as a normal Packagist
# dependency (see composer.json — no `repositories` path override, no
# framework sibling checkout needed). `composer install` pulls the
# framework straight from Packagist, same as any other dependency.
#
# e2e (Playwright) is intentionally NOT run here to keep CI usage light —
# run `composer test:e2e` locally / on demand instead.
on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  quality:
    name: App — composer ci (cs-fixer + phpstan + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # `.env` is gitignored (may hold local secrets), so a fresh checkout
      # never has it — only `.env.example` ships in git. Without it
      # `GarnetEnv::readAppName()` finds no APP_NAME and every `php garnet`
      # command fails with "No active app."
      - name: Bootstrap .env
        run: cp .env.example .env

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, json, pdo, mysqli, fileinfo, intl
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      # GARNET_SKIP_NODE_SETUP suppresses the post-install-cmd's own
      # `garnet setup` call (it would otherwise duplicate the explicit
      # step below and run before Node/npm caching is in place).
      - name: Install PHP deps (pulls garnet-framework from Packagist)
        run: GARNET_SKIP_NODE_SETUP=1 composer install --no-progress --prefer-dist --no-interaction

      # npm install for the app + the framework's FrontBuilder (needed by
      # `garnet build` below) + the node_modules junction. No Playwright
      # browsers — this job doesn't run e2e.
      - name: Set up frontend toolchain
        run: php garnet setup --skip-composer --skip-playwright

      - name: App quality gate (cs-fixer + phpstan + build + build:check)
        run: composer ci

  frontend:
    name: App Frontend — oxlint + tsgo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap .env
        run: cp .env.example .env

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, json, pdo, mysqli, fileinfo, intl
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install PHP deps (pulls garnet-framework from Packagist)
        run: GARNET_SKIP_NODE_SETUP=1 composer install --no-progress --prefer-dist --no-interaction

      # tsgo/oxlint resolve `react` etc. through the framework's
      # FrontBuilder node_modules junction, so this is needed even though
      # this job never runs `garnet build` itself.
      - name: Set up frontend toolchain
        run: php garnet setup --skip-composer --skip-playwright

      - name: oxlint + tsgo
        run: npm run check
