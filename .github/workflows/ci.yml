name: CI

# Active once Apps/IRabi is extracted to its own repository. In the monorepo
# the root-level .github/workflows/ci.yml is what actually runs.

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  php:
    name: PHP ${{ matrix.php }} — static analysis + code style
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json, pdo, mysqli, intl
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Code style (php-cs-fixer)
        run: composer cs:check

      - name: Static analysis (phpstan)
        run: composer phpstan
